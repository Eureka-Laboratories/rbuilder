name: Daily Merge with Upstream Develop

on:
  schedule:
    - cron: '0 0 * * *'   # Runs daily at midnight UTC
  workflow_dispatch:       # Allows manual triggering

permissions:
  contents: write

jobs:
  daily-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fork Repository (Develop Branch)
        uses: actions/checkout@v3
        with:
          ref: develop
          fetch-depth: 0  # Fetch all history for proper merging
          # By default, GITHUB_TOKEN will be used which can now push due to permissions

      - name: Set Git User
        run: |
          git config --local user.email "bot@example.com"
          git config --local user.name "GitHub Actions Bot"

      - name: Add Upstream Remote and Fetch
        run: |
          if ! git remote | grep -q upstream; then
            git remote add upstream https://github.com/flashbots/rbuilder.git
          fi
          git fetch upstream develop

      - name: Merge Upstream Develop into Fork
        run: |
          # Checkout develop (already on it, but just to be explicit)
          git checkout develop
          # Merge upstream changes into develop
          # If conflicts should favor upstream, add: -X theirs
          git merge upstream/develop --no-edit
          
      - name: Push Changes to Fork
        run: |
          git push origin develop
