name: Daily Merge with Upstream Develop

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  daily-merge:
    runs-on: ubuntu-latest

    steps:
      # Checkout the fork's develop branch
      - name: Checkout Fork Repository
        uses: actions/checkout@v3
        with:
          ref: develop
          fetch-depth: 1 # Fetch only the latest commit to save time

      # Configure Git user for commits
      - name: Configure Git User
        run: |
          git config --local user.email "bot@example.com"
          git config --local user.name "GitHub Actions Bot"

      # Add upstream repository and fetch only the develop branch
      - name: Add Upstream and Fetch Develop Branch
        run: |
          git remote add upstream https://github.com/flashbots/rbuilder.git
          git fetch upstream develop

      # Create a new daily branch and merge upstream develop into fork's develop
      - name: Create Daily Branch and Merge
        run: |
          git remote add upstream https://github.com/flashbots/rbuilder.git
          git fetch upstream develop
          git checkout -b daily-merge-$(date +%F) # Create a new daily branch
          git merge upstream/develop --allow-unrelated-histories -X theirs # Resolve conflicts favoring upstream
          git push https://${{ secrets.PAT }}@github.com/Eureka-Laboratories/rbuilder.git daily-merge-$(date +%F) # Push the new branch to your fork
