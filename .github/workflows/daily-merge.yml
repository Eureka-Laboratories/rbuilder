name: Daily Upstream Develop Merge

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:      # Allow manual triggering

permissions:
  contents: write  # Needed to push changes to the fork repository

jobs:
  merge-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork's develop branch
        uses: actions/checkout@v3
        with:
          ref: develop
          fetch-depth: 0  # Fetch all history for reliable merges

      - name: Set Git user configuration
        run: |
          git config user.email "bot@example.com"
          git config user.name "GitHub Actions Bot"

      - name: Add upstream remote and fetch develop
        run: |
          if ! git remote | grep -q upstream; then
            git remote add upstream https://github.com/flashbots/rbuilder.git
          fi
          # Fetch only the upstream develop branch
          git fetch upstream develop --depth=1

      - name: Create a new branch and merge upstream changes
        run: |
          MERGE_BRANCH="daily-merge-$(date +%F)"
          git checkout -b "$MERGE_BRANCH"
          # Merge upstream develop into the fork's new branch.
          # Using 'theirs' strategy to favor upstream changes in any conflicts.
          git merge upstream/develop -X theirs --no-edit
          git push origin "$MERGE_BRANCH"
