name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every hour
  workflow_dispatch:  # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v2.0.10
        with:
          owner: ORIGINAL_OWNER
          base: develop
          head: develop
